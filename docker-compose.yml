version: "3.8"

# Deploy:
#   docker compose up -d
#   Open: http://your-server:8081
#
# With GPU:
#   docker compose --profile gpu up -d

services:
  web:
    build: .
    ports:
      - "8081:8080"
    volumes:
      - storage:/app/storage
      - whisper_cache:/root/.cache/whisper
      - torch_cache:/root/.cache/torch/hub
      # Uncomment for Google Cloud credentials:
      # - ./credentials:/app/credentials:ro
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcloud.json
      - REDIS_URL=redis://:Ph31Du9QflrZAtM5w6UkR87BnoN2p04e@31.97.71.91:30157/0
      - CELERY_BROKER_URL=redis://:Ph31Du9QflrZAtM5w6UkR87BnoN2p04e@31.97.71.91:30157/1
      - CELERY_RESULT_BACKEND=redis://:Ph31Du9QflrZAtM5w6UkR87BnoN2p04e@31.97.71.91:30157/1
    restart: unless-stopped
    command: python web_ui.py
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  worker:
    build: .
    volumes:
      - storage:/app/storage
      - whisper_cache:/root/.cache/whisper
      - torch_cache:/root/.cache/torch/hub
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcloud.json
      - REDIS_URL=redis://:Ph31Du9QflrZAtM5w6UkR87BnoN2p04e@31.97.71.91:30157/0
      - CELERY_BROKER_URL=redis://:Ph31Du9QflrZAtM5w6UkR87BnoN2p04e@31.97.71.91:30157/1
      - CELERY_RESULT_BACKEND=redis://:Ph31Du9QflrZAtM5w6UkR87BnoN2p04e@31.97.71.91:30157/1
    restart: unless-stopped
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info --concurrency=2 -B
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # GPU variant — activate with: docker compose --profile gpu up -d
  web-gpu:
    build: .
    ports:
      - "8081:8080"
    volumes:
      - storage:/app/storage
      - whisper_cache:/root/.cache/whisper
      - torch_cache:/root/.cache/torch/hub
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcloud.json
      - NVIDIA_VISIBLE_DEVICES=all
      - REDIS_URL=redis://:Ph31Du9QflrZAtM5w6UkR87BnoN2p04e@31.97.71.91:30157/0
      - CELERY_BROKER_URL=redis://:Ph31Du9QflrZAtM5w6UkR87BnoN2p04e@31.97.71.91:30157/1
      - CELERY_RESULT_BACKEND=redis://:Ph31Du9QflrZAtM5w6UkR87BnoN2p04e@31.97.71.91:30157/1
    restart: unless-stopped
    command: python web_ui.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

volumes:
  storage:
  whisper_cache:
  torch_cache:
